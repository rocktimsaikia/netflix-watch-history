name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build extension zip
        run: cd src && zip -r ../watch-history-for-netflix-${{ github.event.release.tag_name }}.zip .

      - name: Upload zip to release
        uses: softprops/action-gh-release@v2
        with:
          files: watch-history-for-netflix-${{ github.event.release.tag_name }}.zip
